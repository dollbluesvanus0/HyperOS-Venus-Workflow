name: HyperOS Port Pipeline (RomTools Edition)
on:
  workflow_dispatch:
    inputs:
      donor_url:
        description: 'URL донорской прошивки (ZIP)'
        required: true
      stock_url:
        description: 'URL стоковой прошивки venus (ZIP)'
        required: true
      build_prop_extra:
        description: 'Доп. пропы (key=value, через \n)'
        required: false
        default: ''

jobs:
  port:
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Setup RomTools
        run: bash scripts/00_setup_romtools.sh

      - name: Download ROMs
        run: |
          mkdir -p roms/{donor,stock}
          curl -L -o roms/donor.zip "${{ github.event.inputs.donor_url }}"
          curl -L -o roms/stock.zip "${{ github.event.inputs.stock_url }}"

      - name: Extract & Unpack
        env:
          ROMTOOLS_BIN: ${{ github.workspace }}/RomTools/tool/bin
          ROMTOOLS_FUNC: ${{ github.workspace }}/RomTools/tool/functions
        run: bash scripts/01_extract.sh roms/donor roms/stock work

      - name: Merge & Patch
        run: bash scripts/02_merge_patch.sh work "${{ github.event.inputs.build_prop_extra }}"

      - name: Repack super.img
        env:
          ROMTOOLS_BIN: ${{ github.workspace }}/RomTools/tool/bin
        run: bash scripts/03_repack.sh work output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HyperOS_Port_Venus
          path: output/*
          retention-days: 14
