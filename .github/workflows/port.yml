name: HyperOS Port Pipeline
on:
  workflow_dispatch:
    inputs:
      donor_url:
        description: 'URL донорской прошивки (ZIP)'
        required: true
      stock_url:
        description: 'URL стоковой прошивки venus (ZIP)'
        required: true
      build_prop_extra:
        description: 'Доп. пропы (опционально, формат: key=value\nkey2=value2)'
        required: false
        default: ''

jobs:
  port:
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install tools
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y \
            erofs-utils e2fsprogs android-sdk-libsparse-utils android-sdk-platform-tools \
            p7zip-full python3 curl jq unzip wget liblz4-tool file

          # Payload-dumper-go (автоматический поиск последней версии)
          PDG_URL=$(curl -s https://api.github.com/repos/ssut/payload-dumper-go/releases/latest | jq -r '.assets[] | select(.name | test("linux_amd64.tar.gz")) | .browser_download_url')
          if [ -z "$PDG_URL" ]; then echo "❌ PDG URL not found"; exit 1; fi
          curl -fsSL -o /tmp/pdg.tar.gz "$PDG_URL"
          tar -xzf /tmp/pdg.tar.gz -C /tmp/
          sudo mv /tmp/payload-dumper-go /usr/local/bin/
          sudo chmod +x /usr/local/bin/payload-dumper-go

          # Проверка наличия lpmake/lpunpack (иногда apt ставит старые версии)
          if ! command -v lpmake &> /dev/null || ! command -v lpunpack &> /dev/null; then
            echo "⚠️ lptools not in apt, downloading static binary..."
            curl -fsSL -o /tmp/lptools.tar.gz https://github.com/erfanoabdi/lptools/releases/download/v1.0/lptools_linux_amd64.tar.gz || \
            curl -fsSL -o /tmp/lptools.tar.gz https://github.com/aziz18x/android-tools/releases/download/v1.0/lptools_linux_amd64.tar.gz
            tar -xzf /tmp/lptools.tar.gz -C /tmp/ 2>/dev/null || true
            [ -f /tmp/lpmake ] && sudo mv /tmp/lpmake /tmp/lpunpack /usr/local/bin/
          fi

          echo "🔍 Финальная проверка:"
          command -v simg2img && echo "✅ simg2img"
          command -v lpunpack && echo "✅ lpunpack"
          command -v lpmake && echo "✅ lpmake"
          command -v payload-dumper-go && echo "✅ payload-dumper-go"
          command -v mkfs.erofs && echo "✅ erofs-utils"
          command -v dump.erofs && echo "✅ dump.erofs"

      - name: Download ROMs
        run: |
          mkdir -p roms/{donor,stock}
          curl -L -o roms/donor.zip "${{ github.event.inputs.donor_url }}"
          curl -L -o roms/stock.zip "${{ github.event.inputs.stock_url }}"

      - name: Extract & Unpack
        run: bash scripts/01_extract.sh roms/donor roms/stock work

      - name: Merge & Patch
        run: |
          bash scripts/02_merge_patch.sh work "${{ github.event.inputs.build_prop_extra }}"
          df -h work

      - name: Repack super.img
        run: bash scripts/03_repack.sh work output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HyperOS_Port_Venus
          path: output/*
          retention-days: 14
