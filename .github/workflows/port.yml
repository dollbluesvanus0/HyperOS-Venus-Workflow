- name: Install RomTools
        run: |
          # Клонируем RomTools
          git clone --depth 1 https://github.com/Danda420/RomTools.git /tmp/RomTools
          cd /tmp/RomTools
          
          # Устанавливаем зависимости (если есть скрипт установки)
          if [ -f "install.sh" ]; then
            bash install.sh
          fi
          
          # Добавляем в PATH
          echo "/tmp/RomTools" >> $GITHUB_PATH
          echo "/tmp/RomTools/bin" >> $GITHUB_PATH
          
          # Проверяем наличие инструментов
          echo "🔍 RomTools установлен. Проверка инструментов:"
          command -v unpack_payload && echo "✅ unpack_payload"
          command -v extract_super && echo "✅ extract_super"
          command -v repack_super && echo "✅ repack_super"
          command -v unpack_boot && echo "✅ unpack_boot"
          command -v repack_boot && echo "✅ repack_boot"
          command -v erofs_pack && echo "✅ erofs_pack"
          command -v erofs_unpack && echo "✅ erofs_unpack"
          
          # Если RomTools использует другие имена команд, покажем что есть
          echo "📦 Доступные утилиты в RomTools:"
          ls -1 /tmp/RomTools/ 2>/dev/null || true
          ls -1 /tmp/RomTools/bin/ 2>/dev/null || true
