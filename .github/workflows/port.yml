name: HyperOS Port Pipeline
on:
  workflow_dispatch:
    inputs:
      donor_url:
        description: 'URL донорской прошивки (ZIP)'
        required: true
      stock_url:
        description: 'URL стоковой прошивки venus (ZIP)'
        required: true
      build_prop_extra:
        description: 'Доп. пропы (опционально, формат: key=value\nkey2=value2)'
        required: false
        default: ''

jobs:
  port:
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install Android Kitchen Tools
        run: |
          # 1. Скачиваем AIK-Linux (основа для boot/recovery/ext4/erofs)
          git clone --depth 1 https://github.com/osm0sis/Android-Image-Kitchen.git /tmp/aik
          
          # 2. Скачиваем lptools (lpunpack/lpmake) из официального зеркала Google
          # В platform-tools v34+ они лежат в корне, но иногда переименованы
          curl -fsSL -o /tmp/pt.zip https://dl.google.com/android/repository/platform-tools-latest-linux.zip
          unzip -q /tmp/pt.zip -d /tmp/pt
          
          # 3. Проверяем наличие lpmake/lpunpack, если нет → берём статические бинарники
          if [ ! -f /tmp/pt/platform-tools/lpmake ]; then
            echo "⚠️ lpmake not in platform-tools, using static build"
            curl -fsSL -o /tmp/lptools.tar.gz https://github.com/erfanoabdi/superimg/releases/download/v1.0/lptools_linux.tar.gz 2>/dev/null || \
            curl -fsSL -o /tmp/lptools.tar.gz https://raw.githubusercontent.com/Android-Tools/lptools/main/lptools_linux.tar.gz 2>/dev/null || { echo "❌ lptools unavailable"; exit 1; }
            tar -xzf /tmp/lptools.tar.gz -C /tmp/pt/platform-tools/
          fi
          
          # 4. Собираем все инструменты в одну папку kitchen/tools
          mkdir -p /tmp/kitchen/tools
          cp /tmp/pt/platform-tools/{lpmake,lpunpack,simg2img,img2simg,adb,fastboot} /tmp/kitchen/tools/
          cp /tmp/aik/{unpackimg.sh,repackimg.sh,cleanup.sh,tools/*} /tmp/kitchen/
          chmod +x /tmp/kitchen/tools/* /tmp/kitchen/*.sh
          
          # 5. Добавляем в PATH
          echo "/tmp/kitchen/tools" >> $GITHUB_PATH
          echo "/tmp/kitchen" >> $GITHUB_PATH
          
          # 6. Проверка
          echo "🔍 Kitchen tools ready:"
          command -v lpmake && echo "✅ lpmake"
          command -v lpunpack && echo "✅ lpunpack"
          command -v simg2img && echo "✅ simg2img"
          command -v unpackimg.sh && echo "✅ AIK unpack"
          command -v mkfs.erofs && echo "✅ erofs (apt)"

      - name: Download ROMs
        run: |
          mkdir -p roms/{donor,stock}
          curl -L -o roms/donor.zip "${{ github.event.inputs.donor_url }}"
          curl -L -o roms/stock.zip "${{ github.event.inputs.stock_url }}"

      - name: Extract & Unpack
        run: bash scripts/01_extract.sh roms/donor roms/stock work

      - name: Merge & Patch
        run: |
          bash scripts/02_merge_patch.sh work "${{ github.event.inputs.build_prop_extra }}"
          df -h work

      - name: Repack super.img
        run: bash scripts/03_repack.sh work output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HyperOS_Port_Venus
          path: output/*
          retention-days: 14
