name: HyperOS Port Pipeline
on:
  workflow_dispatch:
    inputs:
      donor_url:
        description: 'URL донорской прошивки (ZIP)'
        required: true
      stock_url:
        description: 'URL стоковой прошивки venus (ZIP)'
        required: true
      build_prop_extra:
        description: 'Доп. пропы (опционально, формат: key=value\nkey2=value2)'
        required: false
        default: ''

jobs:
  port:
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install tools
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y \
            erofs-utils e2fsprogs android-sdk-libsparse-utils \
            p7zip-full python3 curl jq unzip wget liblz4-tool file

          # 1. Скачиваем официальные Google Platform Tools
          curl -fsSL -o /tmp/pt.zip https://dl.google.com/android/repository/platform-tools-latest-linux.zip
          unzip -q /tmp/pt.zip -d /tmp/
          
          # В архиве Google бинарники лежат внутри platform-tools/platform-tools/
          PT_BIN="/tmp/platform-tools/platform-tools"
          if [ ! -f "$PT_BIN/lpmake" ]; then
            echo "⚠️ lpmake/lpunpack not found in official archive. Using verified static build."
            curl -fsSL -o /tmp/lptools.tar.gz https://github.com/Android-Tools/lptools/releases/download/v1.0/lptools_linux_amd64.tar.gz 2>/dev/null || \
            curl -fsSL -o /tmp/lptools.tar.gz https://github.com/aziz18x/android-tools/releases/download/v1.0/lptools_linux_amd64.tar.gz
            [ -f /tmp/lptools.tar.gz ] && tar -xzf /tmp/lptools.tar.gz -C "$PT_BIN/"
          fi
          
          # 2. Копируем в /usr/local/bin
          sudo cp "$PT_BIN"/{lpmake,lpunpack,simg2img,img2simg} /usr/local/bin/ 2>/dev/null || true
          sudo chmod +x /usr/local/bin/{lpmake,lpunpack,simg2img,img2simg}

          # 3. Payload-dumper-go
          PDG_URL=$(curl -s https://api.github.com/repos/ssut/payload-dumper-go/releases/latest | jq -r '.assets[] | select(.name | test("linux_amd64.tar.gz")) | .browser_download_url')
          if [ -z "$PDG_URL" ]; then echo "❌ PDG URL not found"; exit 1; fi
          curl -fsSL -o /tmp/pdg.tar.gz "$PDG_URL"
          tar -xzf /tmp/pdg.tar.gz -C /tmp/
          sudo mv /tmp/payload-dumper-go /usr/local/bin/
          sudo chmod +x /usr/local/bin/payload-dumper-go

          # 4. Финальная проверка
          echo "🔍 Статус инструментов:"
          command -v simg2img && echo "✅ simg2img"
          command -v lpunpack && echo "✅ lpunpack"
          command -v lpmake && echo "✅ lpmake"
          command -v payload-dumper-go && echo "✅ payload-dumper-go"
          command -v mkfs.erofs && echo "✅ erofs-utils"

      - name: Download ROMs
        run: |
          mkdir -p roms/{donor,stock}
          curl -L -o roms/donor.zip "${{ github.event.inputs.donor_url }}"
          curl -L -o roms/stock.zip "${{ github.event.inputs.stock_url }}"

      - name: Extract & Unpack
        run: bash scripts/01_extract.sh roms/donor roms/stock work

      - name: Merge & Patch
        run: |
          bash scripts/02_merge_patch.sh work "${{ github.event.inputs.build_prop_extra }}"
          df -h work

      - name: Repack super.img
        run: bash scripts/03_repack.sh work output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HyperOS_Port_Venus
          path: output/*
          retention-days: 14
